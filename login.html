<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAABAS Login/Register</title>
<style>
body{font-family:Arial;background:#f6f4f2;color:#333;display:flex;justify-content:center;align-items:center;height:100vh;}
.container{background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.1);width:320px;text-align:center;}
input{width:90%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
button{padding:8px 14px;background:#ff7a18;color:#fff;border:none;border-radius:8px;margin-top:10px;cursor:pointer;}
h2{margin-bottom:12px;color:#b25d2a;}
</style>
</head>
<body>

<div class="container">
  <h2>SAABAS Register/Login</h2>
  <input type="text" id="name" placeholder="Full Name"><br>
  <input type="text" id="address" placeholder="Address"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="text" id="phone" placeholder="Phone Number"><br>
  <button onclick="register()">Register & Login</button>
</div>

<script>
function register(){
  const name = document.getElementById('name').value.trim();
  const address = document.getElementById('address').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  
  if(!name || !address || !email || !phone){
    alert('Please fill all fields!');
    return;
  }
  
  // Save user info in localStorage
  const user = {name, address, email, phone};
  localStorage.setItem('saabasUser', JSON.stringify(user));
  
  // Redirect to demo.html
  window.location.href = 'demo.html';
}
</script>

</body>
</html>
